<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;600&family=Cormorant+Garamond:ital@1&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 0; margin: 0; }
.hero {
  position: relative; width: 700px; height: 350px;
  background: #0e2020 url('../assets/photos/amaryllis-02.webp') center/cover no-repeat;
  overflow: hidden;
}
.hero::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(14,59,58,0) 35%, rgba(14,59,58,0.6) 100%);
}
.hero-content {
  position: absolute; bottom: 26px; left: 30px; right: 30px;
  z-index: 2; color: #faf5e9;
}
.eyebrow {
  font: 200 10px/1 'Jost'; letter-spacing: 0.55em; text-transform: uppercase;
  color: #c47254; margin-bottom: 14px;
}
.title {
  font: 200 38px/1.05 'Jost'; letter-spacing: 0.12em; text-transform: uppercase;
  color: #faf5e9; margin-bottom: 8px;
}
.sub {
  font: italic 400 17px/1.4 'Cormorant Garamond';
  color: rgba(250,245,233,0.85);
}
.tags {
  position: absolute; top: 22px; left: 30px; display: flex; gap: 10px; z-index: 2;
}
.chip {
  background: rgba(255,255,255,0.15); backdrop-filter: blur(6px);
  border-radius: 999px; padding: 5px 14px;
  font: 500 11px/1 'Jost'; color: #fff;
}
</style>
</head>
<body>
<div class="hero">
  <div class="tags">
    <span class="chip">⭐ Coup de cœur Airbnb</span>
    <span class="chip">★ 4,94 · 33 avis</span>
  </div>
  <div class="hero-content">
    <div class="eyebrow">Locations d'exception</div>
    <div class="title">Villa Amaryllis</div>
    <div class="sub">Sainte-Luce, Martinique — vue mer, piscine à débordement, jardin tropical.</div>
  </div>
</div>
</body></html>
