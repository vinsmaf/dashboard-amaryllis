<!doctype html>
<html lang="fr"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 26px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 14px 10px; }
  .cell {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: #0e3b3a;
  }
  .cell .ico {
    width: 30px; height: 30px;
    color: #0e3b3a;
  }
  .name {
    font: 500 10px/1 'Jost', sans-serif;
    color: #7a6b5a; letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#bed"/></svg><span class="name">bed</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#bath"/></svg><span class="name">bath</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#users"/></svg><span class="name">users</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#pool"/></svg><span class="name">pool</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#wifi"/></svg><span class="name">wifi</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#car"/></svg><span class="name">car</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#home"/></svg><span class="name">home</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#calendar"/></svg><span class="name">calendar</span></div>
  <div class="cell"><svg class="ico" style="color:#c9a673"><use href="../assets/icons.svg#star"/></svg><span class="name">star</span></div>
  <div class="cell"><svg class="ico" style="color:#c47254"><use href="../assets/icons.svg#heart"/></svg><span class="name">heart</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#share"/></svg><span class="name">share</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#search"/></svg><span class="name">search</span></div>
  <div class="cell"><svg class="ico" style="color:#16a34a"><use href="../assets/icons.svg#check"/></svg><span class="name">check</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#x"/></svg><span class="name">x</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#arrow-right"/></svg><span class="name">arrow-right</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#arrow-left"/></svg><span class="name">arrow-left</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#palm"/></svg><span class="name">palm</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#waves"/></svg><span class="name">waves</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#map-pin"/></svg><span class="name">map-pin</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#message"/></svg><span class="name">message</span></div>
  <div class="cell"><svg class="ico"><use href="../assets/icons.svg#lock"/></svg><span class="name">lock</span></div>
</div>
</body></html>
