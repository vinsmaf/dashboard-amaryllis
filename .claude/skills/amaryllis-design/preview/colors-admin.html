<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=JetBrains+Mono:wght@500&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 24px 24px; background: #0a0f1e; color: #f1f5f9; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.sw { border-radius: 12px; overflow: hidden; background: #0f172a; border: 1px solid rgba(255,255,255,0.08); }
.sw .chip { height: 90px; }
.sw .meta { padding: 10px 12px; }
.name { font: 500 13px/1 'Jost'; color: #f1f5f9; }
.hex { font: 500 11px/1 'JetBrains Mono', monospace; color: #94a3b8; margin-top: 5px; letter-spacing: 0.02em; }
.role { font: 300 10px/1.3 'Jost'; color: #64748b; margin-top: 4px; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#0a0f1e"></div><div class="meta"><div class="name">Ink</div><div class="hex">#0A0F1E</div><div class="role">Page</div></div></div>
  <div class="sw"><div class="chip" style="background:#0f172a"></div><div class="meta"><div class="name">Panel</div><div class="hex">#0F172A</div><div class="role">Surface</div></div></div>
  <div class="sw"><div class="chip" style="background:#1e293b"></div><div class="meta"><div class="name">Elevated</div><div class="hex">#1E293B</div><div class="role">Cards</div></div></div>
  <div class="sw"><div class="chip" style="background:#334155"></div><div class="meta"><div class="name">Border</div><div class="hex">#334155</div><div class="role">Dividers</div></div></div>
  <div class="sw"><div class="chip" style="background:#f1f5f9"></div><div class="meta"><div class="name">FG-1</div><div class="hex">#F1F5F9</div><div class="role">Primary text</div></div></div>
  <div class="sw"><div class="chip" style="background:#cbd5e1"></div><div class="meta"><div class="name">FG-2</div><div class="hex">#CBD5E1</div><div class="role">Body</div></div></div>
  <div class="sw"><div class="chip" style="background:#94a3b8"></div><div class="meta"><div class="name">FG-3</div><div class="hex">#94A3B8</div><div class="role">Secondary</div></div></div>
  <div class="sw"><div class="chip" style="background:#64748b"></div><div class="meta"><div class="name">FG-4</div><div class="hex">#64748B</div><div class="role">Muted</div></div></div>
</div>
</body></html>
