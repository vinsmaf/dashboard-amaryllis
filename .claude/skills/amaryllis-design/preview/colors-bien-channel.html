<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@500&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 22px 24px; background: #0a0f1e; color: #f1f5f9; }
.section { font: 600 9px/1 'Jost'; letter-spacing: 0.32em; text-transform: uppercase; color: #94a3b8; margin-bottom: 12px; }
.row-tags { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 16px; }
.tag {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 10px 6px 9px; border-radius: 10px; background: #0f172a;
  border: 1px solid rgba(255,255,255,0.05);
}
.dot { width: 26px; height: 26px; border-radius: 50%; }
.tag-name { font: 500 10px/1 'Jost'; color: #f1f5f9; }
.tag-hex { font: 500 9px/1 'JetBrains Mono', monospace; color: #64748b; }

.row-tags-2 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.chan {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px;
  background: #0f172a; border: 1px solid rgba(255,255,255,0.05);
}
.chan .swatch { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; }
.chan .lbl { font: 500 12px/1 'Jost'; color: #f1f5f9; }
.chan .hx { font: 500 10px/1 'JetBrains Mono', monospace; color: #64748b; margin-top: 3px; }
</style>
</head>
<body>
<div class="section">Property identity — admin only</div>
<div class="row-tags">
  <div class="tag"><div class="dot" style="background:#0ea5e9"></div><div class="tag-name">Nogent</div><div class="tag-hex">#0EA5E9</div></div>
  <div class="tag"><div class="dot" style="background:#10b981"></div><div class="tag-name">Amaryllis</div><div class="tag-hex">#10B981</div></div>
  <div class="tag"><div class="dot" style="background:#6366f1"></div><div class="tag-name">Iguana</div><div class="tag-hex">#6366F1</div></div>
  <div class="tag"><div class="dot" style="background:#f59e0b"></div><div class="tag-name">Geko</div><div class="tag-hex">#F59E0B</div></div>
  <div class="tag"><div class="dot" style="background:#3b82f6"></div><div class="tag-name">Zandoli</div><div class="tag-hex">#3B82F6</div></div>
  <div class="tag"><div class="dot" style="background:#ec4899"></div><div class="tag-name">Mabouya</div><div class="tag-hex">#EC4899</div></div>
  <div class="tag"><div class="dot" style="background:#8b5cf6"></div><div class="tag-name">Schoelcher</div><div class="tag-hex">#8B5CF6</div></div>
</div>
<div class="section">Booking channel</div>
<div class="row-tags-2">
  <div class="chan"><div class="swatch" style="background:#FF5A5F"></div><div><div class="lbl">Airbnb</div><div class="hx">#FF5A5F</div></div></div>
  <div class="chan"><div class="swatch" style="background:#0ea5e9"></div><div><div class="lbl">Booking</div><div class="hx">#0EA5E9</div></div></div>
  <div class="chan"><div class="swatch" style="background:#10b981"></div><div><div class="lbl">Direct</div><div class="hx">#10B981</div></div></div>
  <div class="chan"><div class="swatch" style="background:#a855f7"></div><div><div class="lbl">Autre</div><div class="hx">#A855F7</div></div></div>
</div>
</body></html>
