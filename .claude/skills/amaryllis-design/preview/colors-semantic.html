<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=JetBrains+Mono:wght@500&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 24px; }
.section { font: 600 9px/1 'Jost'; letter-spacing: 0.32em; text-transform: uppercase; color: #7a6b5a; margin-bottom: 12px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
.sw { border-radius: 10px; overflow: hidden; border: 1px solid #e0d4bc; background: #fff; }
.sw .chip { height: 56px; display: flex; align-items: flex-end; padding: 6px 9px; }
.sw .chip span { font: 500 9px/1 'JetBrains Mono', monospace; }
.sw .meta { padding: 8px 10px; }
.name { font: 500 12px/1 'Jost'; color: #0e3b3a; }
.role { font: 300 10px/1.3 'Jost'; color: #7a6b5a; margin-top: 2px; }
</style>
</head>
<body>
<div class="section">Semantic — used in both surfaces</div>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#16a34a;color:#fff"><span>#16A34A</span></div><div class="meta"><div class="name">Success</div><div class="role">"Direct -15%"</div></div></div>
  <div class="sw"><div class="chip" style="background:#d97706;color:#fff"><span>#D97706</span></div><div class="meta"><div class="name">Warning</div><div class="role">Deposit notice</div></div></div>
  <div class="sw"><div class="chip" style="background:#ef4444;color:#fff"><span>#EF4444</span></div><div class="meta"><div class="name">Danger</div><div class="role">Indispo / errors</div></div></div>
  <div class="sw"><div class="chip" style="background:#0ea5e9;color:#fff"><span>#0EA5E9</span></div><div class="meta"><div class="name">Info</div><div class="role">Booking · sync</div></div></div>
</div>
</body></html>
