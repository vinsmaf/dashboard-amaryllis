<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=JetBrains+Mono:wght@500&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 24px 24px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.sw { border-radius: 12px; overflow: hidden; border: 1px solid #e0d4bc; }
.sw .chip { height: 100px; }
.sw .meta { padding: 10px 12px; background: #fff; }
.name { font: 500 13px/1 'Jost'; color: #0e3b3a; }
.hex { font: 500 11px/1 'JetBrains Mono', monospace; color: #7a6b5a; margin-top: 5px; letter-spacing: 0.02em; }
.role { font: 300 10px/1.3 'Jost'; color: #7a6b5a; margin-top: 4px; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#faf5e9"></div><div class="meta"><div class="name">Ivory</div><div class="hex">#FAF5E9</div><div class="role">Page paper</div></div></div>
  <div class="sw"><div class="chip" style="background:#f4ecdc"></div><div class="meta"><div class="name">Cream</div><div class="hex">#F4ECDC</div><div class="role">Recessed card</div></div></div>
  <div class="sw"><div class="chip" style="background:#e0d4bc"></div><div class="meta"><div class="name">Sand</div><div class="hex">#E0D4BC</div><div class="role">Borders</div></div></div>
  <div class="sw"><div class="chip" style="background:#0e3b3a"></div><div class="meta"><div class="name">Navy</div><div class="hex">#0E3B3A</div><div class="role">Ink · text</div></div></div>
  <div class="sw"><div class="chip" style="background:#c47254"></div><div class="meta"><div class="name">Coral</div><div class="hex">#C47254</div><div class="role">Primary CTA</div></div></div>
  <div class="sw"><div class="chip" style="background:#a85a3f"></div><div class="meta"><div class="name">Coral deep</div><div class="hex">#A85A3F</div><div class="role">CTA hover</div></div></div>
  <div class="sw"><div class="chip" style="background:#c9a673"></div><div class="meta"><div class="name">Gold</div><div class="hex">#C9A673</div><div class="role">Ratings</div></div></div>
  <div class="sw"><div class="chip" style="background:#7a6b5a"></div><div class="meta"><div class="name">Muted</div><div class="hex">#7A6B5A</div><div class="role">Captions</div></div></div>
</div>
</body></html>
