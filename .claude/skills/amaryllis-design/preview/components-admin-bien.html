<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 22px; background: #0a0f1e; color: #f1f5f9; }
.row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.bien-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; padding: 14px;
}
.head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.nm { font: 600 13px/1 'Jost'; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.amt { font: 700 16px/1 'JetBrains Mono'; }

.pbar { margin-top: 10px; }
.pbar-row { display: flex; justify-content: space-between; font: 500 10px/1 'Jost'; color: #64748b; margin-bottom: 4px; }
.pbar-track { height: 5px; background: #1e293b; border-radius: 3px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 3px; }

.spark-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
.spark-label { font: 500 10px/1 'Jost'; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="row">
  <div class="bien-card">
    <div class="head">
      <span class="nm"><span class="dot" style="background:#10b981"></span>Amaryllis</span>
      <span style="font:500 10px/1 'Jost'; color:#10b981">●</span>
    </div>
    <div class="amt" style="color:#10b981">38 001 €</div>
    <div style="font:400 11px/1.3 'Jost'; color:#94a3b8; margin-top:4px">CF +13 192€ · occ 33%</div>

    <div class="pbar">
      <div class="pbar-row"><span>Occupation</span><span style="color:#f59e0b">33%</span></div>
      <div class="pbar-track"><div class="pbar-fill" style="width: 33%; background: #f59e0b"></div></div>
    </div>
    <div class="spark-row">
      <span class="spark-label">Trend</span>
      <svg width="90" height="28" style="flex-shrink:0">
        <polyline points="0,16 11,7 22,8 33,12 44,22 55,21 66,18 77,5 88,9" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
        <circle cx="88" cy="9" r="2.5" fill="#10b981"/>
      </svg>
    </div>
  </div>

  <div class="bien-card">
    <div class="head">
      <span class="nm"><span class="dot" style="background:#3b82f6"></span>Zandoli</span>
      <span style="font:500 10px/1 'Jost'; color:#f59e0b">●</span>
    </div>
    <div class="amt" style="color:#0ea5e9">32 656 €</div>
    <div style="font:400 11px/1.3 'Jost'; color:#94a3b8; margin-top:4px">CF +13 222€ · occ 67%</div>

    <div class="pbar">
      <div class="pbar-row"><span>Occupation</span><span style="color:#f59e0b">67%</span></div>
      <div class="pbar-track"><div class="pbar-fill" style="width: 67%; background: #f59e0b"></div></div>
    </div>
    <div class="spark-row">
      <span class="spark-label">Trend</span>
      <svg width="90" height="28" style="flex-shrink:0">
        <polyline points="0,18 11,12 22,12 33,4 44,20 55,22 66,16 77,15 88,9" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
        <circle cx="88" cy="9" r="2.5" fill="#10b981"/>
      </svg>
    </div>
  </div>

  <div class="bien-card">
    <svg width="64" height="64" style="display:block; margin: 0 auto 6px">
      <circle cx="32" cy="32" r="27" fill="none" stroke="#1e293b" stroke-width="6"/>
      <circle cx="32" cy="32" r="27" fill="none" stroke="#10b981" stroke-width="6"
              stroke-dasharray="135 170" stroke-linecap="round" transform="rotate(-90 32 32)"/>
      <text x="32" y="36" text-anchor="middle" fill="#10b981" font-family="Jost" font-size="12" font-weight="700">80%</text>
    </svg>
    <div style="text-align:center; font:500 11px/1 'Jost'; color:#94a3b8; letter-spacing: 0.05em">Occupation moyenne</div>
    <div style="text-align:center; font:400 10px/1.3 'Jost'; color:#64748b; margin-top:6px">Gauge composant</div>
  </div>
</div>
</body></html>
