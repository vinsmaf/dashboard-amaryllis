<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 24px 24px; background: #0a0f1e; color: #f1f5f9; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.kpi {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; padding: 12px 14px;
}
.kpi .lbl {
  font: 500 10px/1 'Jost';
  color: #64748b; text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 8px;
}
.kpi .val { font: 700 22px/1 'JetBrains Mono', monospace; }
.kpi .sub { font: 400 10px/1 'Jost'; color: #475569; margin-top: 6px; }

.alert {
  margin-top: 14px;
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
  border-radius: 10px; padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  font: 400 12px/1.3 'Jost'; color: #fca5a5;
}
.alert b { color: #f1f5f9; font-weight: 600; }
</style>
</head>
<body>
<div class="grid">
  <div class="kpi"><div class="lbl">CA YTD</div><div class="val" style="color:#0ea5e9">71,8k€</div><div class="sub">5 mois</div></div>
  <div class="kpi"><div class="lbl">CF YTD</div><div class="val" style="color:#10b981">+24,3k€</div><div class="sub">cashflow net</div></div>
  <div class="kpi"><div class="lbl">Occ. 30j</div><div class="val" style="color:#f59e0b">58%</div><div class="sub">104/180 nuits</div></div>
  <div class="kpi"><div class="lbl">RevPAR mois</div><div class="val" style="color:#f59e0b">87€</div><div class="sub">Mai</div></div>
</div>
<div class="alert">
  <span style="color:#ef4444; font-size:14px">⚠</span>
  <span><b>Mabouya</b> · sous-coté ~29% vs marché · potentiel +12-15k€/an</span>
</div>
</body></html>
