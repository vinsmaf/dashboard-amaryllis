<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 26px; }
.row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.row:last-child { margin-bottom: 0; }
.label { font: 600 9px/1 'Jost'; letter-spacing: 0.32em; text-transform: uppercase; color: #7a6b5a; width: 100%; margin-bottom: 4px; }

.btn-cta {
  background: #c47254; color: #fff; border: none;
  border-radius: 6px; padding: 14px 32px;
  font: 600 12px/1 'Jost', sans-serif;
  letter-spacing: 0.12em; text-transform: uppercase;
  box-shadow: 0 4px 18px rgba(196,114,84,0.30);
  cursor: pointer;
}
.btn-cta-lg {
  background: #c47254; color: #fff; border: none;
  border-radius: 6px; padding: 18px 40px;
  font: 400 13px/1 'Jost', sans-serif;
  letter-spacing: 0.14em; text-transform: uppercase;
  box-shadow: 0 4px 22px rgba(196,114,84,0.40);
  cursor: pointer;
}
.btn-secondary {
  background: #0e3b3a; color: #faf5e9; border: none;
  border-radius: 6px; padding: 14px 28px;
  font: 400 12px/1 'Jost', sans-serif;
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer;
}
.btn-ghost {
  background: transparent; color: #0e3b3a;
  border: 1px solid #e0d4bc;
  border-radius: 4px; padding: 7px 20px;
  font: 300 11px/1 'Jost', sans-serif;
  letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer;
}
.btn-text {
  background: none; border: none; color: #7a6b5a;
  font: 400 12px/1 'Jost', sans-serif;
  text-decoration: underline; text-decoration-color: #e0d4bc;
  cursor: pointer; padding: 4px 0;
}
.btn-wa {
  background: #25D366; color: #fff; border: none;
  border-radius: 8px; padding: 12px 22px;
  font: 600 12px/1 'Jost', sans-serif;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="row">
  <span class="label">Primary · ctapulse coral</span>
  <button class="btn-cta">Réserver</button>
  <button class="btn-cta-lg">Découvrir</button>
</div>
<div class="row">
  <span class="label">Navy secondary · WhatsApp · ghost · text</span>
  <button class="btn-secondary">Contact ↗</button>
  <button class="btn-wa">WhatsApp</button>
  <button class="btn-ghost">Voir tout</button>
  <button class="btn-text">← Retour</button>
</div>
</body></html>
