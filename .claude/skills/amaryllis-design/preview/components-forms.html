<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 26px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font: 500 11px/1 'Jost'; color: #7a6b5a;
}
.input, .select {
  background: #faf5e9; border: 1px solid #e0d4bc;
  border-radius: 10px; padding: 11px 14px;
  font: 400 14px/1.2 'Jost'; color: #0e3b3a;
  outline: none;
}
.input:focus, .select:focus { border-color: rgba(196,114,84,0.53); }
.input-coral { border-color: rgba(196,114,84,0.53); }
.input-error { border-color: #ef4444; }
.help { font: 300 11px/1.3 'Jost'; color: #7a6b5a; }
.err { font: 400 11px/1.3 'Jost'; color: #ef4444; }
.search-bar {
  background: #fff; border: 1px solid #e0d4bc; border-radius: 999px;
  padding: 8px 10px 8px 18px;
  display: flex; align-items: center; gap: 10px;
  font: 400 13px/1 'Jost'; color: #0e3b3a;
}
.search-bar input { flex: 1; border: none; outline: none; background: transparent; font: inherit; }
.search-bar button {
  background: #0e3b3a; color: #faf5e9; border: none;
  border-radius: 999px; padding: 9px 18px;
  font: 600 11px/1 'Jost'; letter-spacing: 0.12em; text-transform: uppercase;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="search-bar">
  <span style="font-size:13px; color:#7a6b5a; letter-spacing: 0.12em; text-transform: uppercase;">Arrivée</span>
  <input value="14 août 2026" readonly>
  <span style="border-left: 1px solid #e0d4bc; height: 18px;"></span>
  <span style="font-size:13px; color:#7a6b5a; letter-spacing: 0.12em; text-transform: uppercase;">Départ</span>
  <input value="21 août" readonly>
  <button>Rechercher</button>
</div>
<div style="height: 16px"></div>
<div class="grid">
  <div class="field"><label>Prénom *</label><input class="input" value="Marie"></div>
  <div class="field"><label>Nom *</label><input class="input input-coral" value="Lavalette"></div>
  <div class="field"><label>Email *</label><input class="input input-error" value="invalid@"></div>
  <div class="field"><label>Voyageurs</label><select class="select"><option>2 voyageurs</option></select></div>
</div>
</body></html>
