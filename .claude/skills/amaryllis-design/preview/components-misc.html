<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 24px 24px; background: #faf5e9; }
.row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.pill-tab {
  border-radius: 999px; padding: 7px 18px;
  font: 500 11px/1 'Jost'; letter-spacing: 0.06em;
  border: 1px solid #e0d4bc; background: #fff; color: #7a6b5a;
}
.pill-tab.active { background: #0e3b3a; color: #faf5e9; border-color: #0e3b3a; }

.lang {
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: 999px; padding: 5px 12px;
  font: 500 11px/1 'Jost'; color: #0e3b3a;
  background: #f4ecdc; border: 1px solid #e0d4bc;
}
.lang .sep { color: #c47254; }

.flowmark {
  width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
}
.section { font: 600 9px/1 'Jost'; letter-spacing: 0.32em; text-transform: uppercase; color: #7a6b5a; margin-bottom: 10px; }
.col { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px; background: #fff; border: 1px solid #e0d4bc; border-radius: 14px; }
</style>
</head>
<body>
<div class="row">
  <div class="col">
    <span class="section">Lang toggle</span>
    <span class="lang">FR <span class="sep">·</span> EN</span>
    <span class="lang" style="background:#fff">EN <span class="sep">·</span> FR</span>
  </div>
  <div class="col">
    <span class="section">Pill nav</span>
    <span style="display:flex; gap:6px">
      <span class="pill-tab active">Toutes</span>
      <span class="pill-tab">Court</span>
      <span class="pill-tab">Long</span>
    </span>
  </div>
  <div class="col">
    <span class="section">Loading mark</span>
    <div class="flowmark">
      <svg width="40" height="40" viewBox="-50 -50 100 100">
        <g transform="rotate(0)"><path d="M 0 0 L 0 -38 L 8 -20 Z" fill="#c47254"/></g>
        <g transform="rotate(60)"><path d="M 0 0 L 0 -38 L 8 -20 Z" fill="#c47254"/></g>
        <g transform="rotate(120)"><path d="M 0 0 L 0 -38 L 8 -20 Z" fill="#c47254"/></g>
        <g transform="rotate(180)"><path d="M 0 0 L 0 -38 L 8 -20 Z" fill="#c47254"/></g>
        <g transform="rotate(240)"><path d="M 0 0 L 0 -38 L 8 -20 Z" fill="#c47254"/></g>
        <g transform="rotate(300)"><path d="M 0 0 L 0 -38 L 8 -20 Z" fill="#c47254"/></g>
        <circle cx="0" cy="0" r="4" fill="#c9a673"/>
      </svg>
    </div>
  </div>
</div>
</body></html>
