<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 24px 26px; }
.row { display: grid; grid-template-columns: 60px 1fr 80px; gap: 14px; align-items: center; margin-bottom: 8px; }
.label { font: 500 11px/1 'Jost'; color: #0e3b3a; }
.bar { height: 16px; background: #c47254; border-radius: 3px; }
.value { font: 500 11px/1 'JetBrains Mono', monospace; color: #7a6b5a; text-align: right; }
</style>
</head>
<body>
<div class="row"><span class="label">space-1</span><div class="bar" style="width:4px"></div><span class="value">4px</span></div>
<div class="row"><span class="label">space-2</span><div class="bar" style="width:8px"></div><span class="value">8px</span></div>
<div class="row"><span class="label">space-3</span><div class="bar" style="width:12px"></div><span class="value">12px</span></div>
<div class="row"><span class="label">space-4</span><div class="bar" style="width:16px"></div><span class="value">16px</span></div>
<div class="row"><span class="label">space-5</span><div class="bar" style="width:20px"></div><span class="value">20px</span></div>
<div class="row"><span class="label">space-6</span><div class="bar" style="width:24px"></div><span class="value">24px</span></div>
<div class="row"><span class="label">space-7</span><div class="bar" style="width:32px"></div><span class="value">32px</span></div>
<div class="row"><span class="label">space-8</span><div class="bar" style="width:48px"></div><span class="value">48px</span></div>
<div class="row"><span class="label">space-9</span><div class="bar" style="width:64px"></div><span class="value">64px</span></div>
<div class="row"><span class="label">space-10</span><div class="bar" style="width:96px"></div><span class="value">96px</span></div>
</body></html>
