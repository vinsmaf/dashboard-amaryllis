<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=JetBrains+Mono:wght@500&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
body { padding: 30px 26px; background: #f4ecdc; }
.row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
.cell { text-align: center; }
.tile {
  width: 130px; height: 80px; margin: 0 auto 14px; background: #fff;
  border-radius: 14px;
}
.name { font: 500 11px/1 'Jost'; color: #0e3b3a; }
.val { font: 500 10px/1 'JetBrains Mono'; color: #7a6b5a; margin-top: 5px; }
.use { font: 300 10px/1.3 'Jost'; color: #7a6b5a; margin-top: 7px; max-width: 150px; margin-left: auto; margin-right: auto; }

.s1 { box-shadow: 0 2px 16px rgba(14,59,58,0.06); }
.s2 { box-shadow: 0 12px 32px rgba(14,59,58,0.10); }
.s3 { box-shadow: 0 20px 48px rgba(14,59,58,0.14); }
.s4 { box-shadow: 0 4px 18px rgba(196,114,84,0.30); background: #c47254; }
</style>
</head>
<body>
<div class="row">
  <div class="cell"><div class="tile s1"></div><div class="name">shadow-1</div><div class="val">card resting</div><div class="use">2px / 16px · teal 6%</div></div>
  <div class="cell"><div class="tile s2"></div><div class="name">shadow-2</div><div class="val">card hover</div><div class="use">12px / 32px · teal 10%</div></div>
  <div class="cell"><div class="tile s3"></div><div class="name">shadow-3</div><div class="val">modal · floating</div><div class="use">20px / 48px · teal 14%</div></div>
</div>
<div style="height: 28px"></div>
<div class="row">
  <div class="cell"><div class="tile s4"></div><div class="name">shadow-cta</div><div class="val">primary button</div><div class="use">4px / 18px · coral 30%</div></div>
  <div class="cell"></div>
  <div class="cell"></div>
</div>
</body></html>
