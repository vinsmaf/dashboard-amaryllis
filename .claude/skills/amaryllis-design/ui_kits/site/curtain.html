<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Curtain demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  body[data-surface="site"] {
    margin: 0; background: var(--c-ivory);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .panel {
    text-align: center;
    max-width: 480px;
  }
  .panel h1 { margin: 0 0 12px; }
  .panel button {
    margin-top: 32px;
    background: var(--c-coral); color: #fff; border: none;
    padding: 14px 36px; border-radius: 6px;
    font-family: 'Jost', sans-serif; font-weight: 600; font-size: 12px;
    letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer; box-shadow: var(--shadow-cta);
  }
  .panel .note { font-family: 'Jost', sans-serif; color: var(--c-muted); font-size: 12px; margin-top: 22px; letter-spacing: 0.04em; }
</style>
</head>
<body data-surface="site">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="Curtain.jsx"></script>

<script type="text/babel">
const { useState } = React;

function Demo() {
  const [show, setShow] = useState(true);
  const [count, setCount] = useState(0);

  return (
    <>
      {show && <Curtain onDone={() => setShow(false)} />}
      <div className="panel">
        <div style={{
          fontFamily: "'Jost', sans-serif", fontWeight: 200, fontSize: 11,
          letterSpacing: "0.55em", textTransform: "uppercase", color: "var(--c-coral)",
          marginBottom: 18,
        }}>Aperçu du curtain</div>
        <h1 style={{
          fontFamily: "'Jost', sans-serif", fontWeight: 200, fontSize: 44,
          letterSpacing: "0.12em", textTransform: "uppercase", color: "var(--c-navy)",
        }}>Bienvenue</h1>
        <p style={{
          fontFamily: "'Cormorant Garamond', serif", fontStyle: "italic",
          fontSize: 18, color: "var(--c-text)", lineHeight: 1.6, margin: "12px 0 0",
        }}>
          Le rideau couvre l'écran pendant ~800ms, le temps que la fleur tourne, puis se soulève en 900ms — cubic-bezier(0.76, 0, 0.24, 1).
        </p>
        <button onClick={() => { setShow(true); setCount(c => c+1); }}>
          Rejouer
        </button>
        <div className="note">
          Joué {count + 1} fois · Composant <code style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, background: "var(--c-cream)", padding: "2px 6px", borderRadius: 4 }}>&lt;Curtain onDone /&gt;</code>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>

</body>
</html>
