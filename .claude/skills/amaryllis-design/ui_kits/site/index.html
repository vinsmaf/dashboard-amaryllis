<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Amaryllis — UI Kit (site)</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" type="image/svg+xml" href="../../assets/logo.svg"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  body[data-surface="site"] { background: var(--c-ivory); margin: 0; }
  .gallery-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; grid-template-rows: 220px 220px; gap: 8px; }
  .gallery-grid img { width: 100%; height: 100%; object-fit: cover; }
  .gallery-grid > :first-child { grid-row: span 2; }
  .layout-2col { display: grid; grid-template-columns: 1fr 380px; gap: 60px; padding: 64px 0 80px; }

  @media (max-width: 900px) {
    .layout-2col { grid-template-columns: 1fr; gap: 32px; padding: 36px 0 56px; }
    .gallery-grid {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 200px 140px 140px;
    }
    .gallery-grid > :first-child { grid-column: 1 / -1; grid-row: 1; }
    .gallery-grid > :nth-child(4),
    .gallery-grid > :nth-child(5) { display: none; }
  }
  @media (max-width: 560px) {
    .gallery-grid {
      grid-template-columns: 1fr;
      grid-template-rows: 240px;
    }
    .gallery-grid > * { grid-column: 1; grid-row: 1; }
    .gallery-grid > :not(:first-child) { display: none; }
  }
</style>
</head>
<body data-surface="site">

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<!-- Components -->
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="ThemeToggle.jsx"></script>
<script type="text/babel" src="Curtain.jsx"></script>
<script type="text/babel" src="Calendar.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="PropertyCard.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const PHOTO = "../../assets/photos";
const PROPERTIES = [
  { id: "amaryllis", name: "Villa Amaryllis", location: "Sainte-Luce, Martinique", price: 280, rating: "4,94", reviews: 33,
    guests: 6, bedrooms: 3, tag: "⭐ Coup de cœur Airbnb",
    photos: [`${PHOTO}/amaryllis-01.webp`, `${PHOTO}/amaryllis-02.webp`, `${PHOTO}/amaryllis-05.webp`, `${PHOTO}/amaryllis-08.webp`] },
  { id: "zandoli", name: "Zandoli", location: "Sainte-Luce, Martinique", price: 220, rating: "4,5", reviews: 16,
    guests: 4, bedrooms: 2, photos: [`${PHOTO}/zandoli-01.webp`] },
  { id: "geko", name: "Géko", location: "Sainte-Luce, Martinique", price: 140, rating: "4,7", reviews: 22,
    guests: 2, bedrooms: 1, photos: [`${PHOTO}/geko-01.webp`] },
  { id: "mabouya", name: "Mabouya", location: "Sainte-Luce, Martinique", price: 110, rating: "4,8", reviews: 19,
    guests: 2, bedrooms: 1, tag: "Jacuzzi privé",
    photos: [`${PHOTO}/mabouya-01.webp`] },
  { id: "schoelcher", name: "Bellevue", location: "Schœlcher, Martinique", price: 95, rating: "4,6", reviews: 11,
    guests: 3, bedrooms: 1, photos: [`${PHOTO}/schoelcher-01.webp`] },
  { id: "nogent", name: "Aux Portes de Paris", location: "Nogent-sur-Marne", price: 120, rating: "4,9", reviews: 14,
    guests: 4, bedrooms: 1, photos: [`${PHOTO}/nogent-01.webp`] },
];

const AMENITIES = ["Piscine à débordement", "Jacuzzi privé", "Vue océan", "Wifi Starlink", "Parking privé", "Animaux OK", "Climatisation", "Linge fourni"];

const REVIEWS = [
  { author: "Sophie M.", country: "🇫🇷", date: "Avr. 2025", rating: 5,
    text: "Vue extraordinaire, piscine à débordement parfaite et hôte très réactif. Un endroit hors du temps face aux Caraïbes." },
  { author: "James K.", country: "🇬🇧", date: "Mars 2025", rating: 5,
    text: "Stunning villa with incredible Caribbean views. The salt water infinity pool is exceptional. Best Airbnb we've stayed in — period." },
  { author: "Marie-Claire D.", country: "🇫🇷", date: "Fév. 2025", rating: 5,
    text: "Séjour magique en famille. La terrasse de 100m² face à la mer est un rêve éveillé. Impeccable de l'accueil aux moindres détails." },
];

const FAQS = [
  { q: "Quels sont les horaires de check-in et check-out?", a: "Check-in à partir de 17h, check-out avant 12h. Early check-in et late check-out sont possibles selon disponibilité (supplément 80€).", open: true },
  { q: "Les animaux sont-ils acceptés?", a: "Oui, jusqu'à 2 animaux maximum, avec un supplément de 40€ par séjour. Sauf à Nogent où ils ne sont pas autorisés." },
  { q: "Quel est le montant du dépôt de garantie?", a: "Le dépôt varie de 500€ à 1 500€ selon le bien. Il est pré-autorisé sur votre carte mais jamais débité, et libéré automatiquement 3 jours après votre départ." },
  { q: "Faut-il une voiture pour le séjour?", a: "Une voiture automatique est fortement recommandée pour profiter pleinement de la Martinique. Pour le T2 Nogent, le RER A est à 10 minutes à pied." },
];

function App() {
  const [view, setView] = useState("home"); // home | detail
  const [selected, setSelected] = useState(null);
  const [showCurtain, setShowCurtain] = useState(true);

  function open(p) { setSelected(p); setView("detail"); window.scrollTo(0, 0); }
  function home() { setView("home"); window.scrollTo(0, 0); }

  return (
    <>
      {showCurtain && <Curtain onDone={() => setShowCurtain(false)} />}
      <ThemeToggle/>
      {view === "home" ? <HomePage onOpen={open} /> : <DetailPage property={selected} onBack={home} />}
    </>
  );
}

function HomePage({ onOpen }) {
  return (
    <div data-screen-label="01 Home — Marketing list">
      <Hero
        photo={`${PHOTO}/amaryllis-02.webp`}
        eyebrow="Locations d'exception"
        title="Amaryllis"
        sub="Sept locations de prestige en Martinique et en Île-de-France. Réservation directe, sans frais de service."
        chips={["⭐ Coup de cœur Airbnb", "★ 4,94 · 200+ avis"]}
        height={520}
      />

      <div className="container" style={{ padding: "72px 24px 28px" }}>
        <SectionHead
          eyebrow="Nos sept biens"
          title="Choisissez votre séjour"
          lede="De la villa avec piscine à l'appartement parisien — chaque adresse est gérée par notre équipe sur place, avec la même exigence."
          align="center"
          style={{ marginBottom: 48 }}
        />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 22 }}>
          {PROPERTIES.map(p => <PropertyCard key={p.id} property={p} onClick={() => onOpen(p)} />)}
        </div>
      </div>

      <div style={{ background: "var(--c-cream)", padding: "72px 0", marginTop: 72 }}>
        <div className="container">
          <SectionHead
            eyebrow="Ils en parlent"
            title="200 voyageurs, une moyenne de 4,94 ★"
            align="center"
            style={{ marginBottom: 48 }}
          />
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 22 }}>
            {REVIEWS.map(r => <ReviewBlock key={r.author} {...r} />)}
          </div>
        </div>
      </div>

      <Footer />
    </div>
  );
}

function DetailPage({ property, onBack }) {
  return (
    <div data-screen-label="02 Detail — Single property">
      <TopBar
        propertyName={property.name}
        price={property.price}
        onBack={onBack}
        onBook={() => alert("Réserver: " + property.name)}
      />

      <div className="container" style={{ padding: "24px 24px 0" }}>
        <div className="gallery-grid">
          <img src={property.photos[0] || `${PHOTO}/amaryllis-01.webp`} alt=""/>
          <img src={property.photos[1] || `${PHOTO}/amaryllis-02.webp`} alt=""/>
          <img src={property.photos[2] || `${PHOTO}/amaryllis-05.webp`} alt=""/>
          <img src={property.photos[3] || `${PHOTO}/amaryllis-08.webp`} alt=""/>
          <img src={`${PHOTO}/amaryllis-11.webp`} alt=""/>
        </div>
      </div>

      <div className="container layout-2col">
        <div>
          <Eyebrow color="coral" tracking="0.55em">{property.tag || property.location}</Eyebrow>
          <Display size="xl" style={{ margin: "12px 0 20px" }}>{property.name}</Display>
          <div style={{ display: "flex", gap: 18, marginBottom: 32, alignItems: "center", flexWrap: "wrap" }}>
            <RatingBadge rating={property.rating} count={property.reviews} />
            <span style={{ fontFamily: "'Jost', sans-serif", fontSize: 13, color: "var(--c-muted)" }}>
              {property.guests} voyageurs · {property.bedrooms} chambres · piscine privée · vue mer
            </span>
          </div>

          <Editorial size="md" style={{ fontSize: 19, lineHeight: 1.85, marginBottom: 48 }}>
            Perchée sur les hauteurs de Sainte-Luce, bercée par les alizés et le parfum des fleurs tropicales, la Villa Amaryllis vous invite à un séjour d'exception. Notre équipe sur place, attentionnée et discrète, veille à ce que chaque instant soit parfait.
          </Editorial>

          <DescriptionBlock eyebrow="Les chambres" text="Trois chambres spacieuses avec lit king-size, salle de bain privative à douche italienne, vasque en pierre naturelle, et accès direct à la terrasse face à la mer." />
          <DescriptionBlock eyebrow="Les extérieurs" text="Terrasse en bois Cumaru de 100 m², piscine lagon à débordement avec plage immergée chauffée par le soleil, carbet traditionnel en feuille de latanier équipé d'un hamac, jardin tropical fleuri." />
          <DescriptionBlock eyebrow="Équipements" text="Wifi Starlink haut débit, TV connectée, linge de maison fourni, cuisine américaine entièrement équipée — réfrigérateur, plaques à induction, four combiné, lave-vaisselle." />

          <div style={{ marginBottom: 48 }}>
            <div style={{ fontFamily: "'Jost', sans-serif", fontSize: 9, letterSpacing: "0.42em", textTransform: "uppercase", color: "var(--c-muted)", fontWeight: 600, marginBottom: 16 }}>
              Équipements
            </div>
            <AmenityCloud amenities={AMENITIES} onMore={() => {}} />
          </div>

          <div style={{ marginBottom: 48 }}>
            <SectionHead eyebrow="Questions fréquentes" title="Tout pour préparer votre séjour" />
            <div style={{ marginTop: 24 }}>
              {FAQS.map((f, i) => <FAQAccordion key={i} q={f.q} a={f.a} defaultOpen={f.open} />)}
            </div>
          </div>
        </div>

        <div>
          <BookingPanel
            price={property.price}
            rating={property.rating}
            reviews={property.reviews}
            onBook={() => alert("Réserver — " + property.name)}
          />
        </div>
      </div>

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
