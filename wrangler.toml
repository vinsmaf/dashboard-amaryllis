name = "amaryllis-ical-sync"
main = "workers/ical-sync/index.js"
# Bumpé 2026-07-16 (était 2024-09-23) — changelog compat_flags vérifié entre les 2 dates :
# seuls 2 changements potentiellement pertinents pour ce Worker (strip Authorization sur
# redirect cross-origin ; request.cf prioritaire sur les Cache Rules), aucun ne s'applique
# en pratique (Stripe/Resend/Apify ne redirigent jamais cross-origin ; le seul usage de
# cf:{} ici est déjà un "ne jamais cacher" que le nouveau comportement ne fait que renforcer).
compatibility_date = "2026-07-16"
compatibility_flags = ["nodejs_compat"]

# Workers Logs (ajouté 2026-07-16) — seule visibilité auparavant : console.log en direct via
# `wrangler tail`, rien ne persiste après coup. head_sampling_rate=1 (100%) volontaire : ce
# Worker n'a aucun trafic HTTP public (8 crons + quelques endpoints internes déclenchés
# manuellement), volume largement sous le palier gratuit (200k events/jour) — pas de raison
# d'échantillonner en dessous et de risquer de rater exactement le run qu'on veut relire.
[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = [
  "*/10 * * * *", # Sync iCal + annulations non payées + publication éditoriale + relance panier + enrichissement résas Airbnb (était */15)
  "0 9 * * *",    # Brief matinal + agents + orchestrateur + prearrivee + poststay + j1-acces — 9h UTC (5h MQ)
  "0 11 * * 1",   # Réunion Générale cross-fleet — lundi 11h UTC (7h Martinique)
  "0 12 * * *",   # Génération drafts éditoriaux J+2 + alerte ménage — 12h UTC (8h MQ)
  "0 13 * * *",   # Charge balance soldes 2× J-30 — 13h UTC (migré depuis cron-job.org 7798126)
  "0 6 * * 1",    # Rapport hebdo + prix-recap + QA hebdo (flux/endpoints/tracking/emails) — lundi 6h UTC
  "0 1 1 * *",    # Mensuel — export comptable + article SEO long-tail + QA mensuel (sécu/SEO/multimedia)
  "0 20 * * 7",   # Dimanche 20h UTC (16h Martinique) — accountability hebdo + ntfy avant réunion lundi
]

# KV namespace pour stocker les UIDs connus (anti-doublon notifications)
# Pour créer : wrangler kv:namespace create "ICAL_STORE"
# Puis remplacer les IDs ci-dessous
[[kv_namespaces]]
binding = "ICAL_STORE"
id = "7d431dde6407494b979e5720e5c7a71c"
preview_id = "75d715c5f2f5492f975c86c7995738d4"

[[kv_namespaces]]
binding = "CROSS_BRAIN_KV"
id = "fc2f8d9276ab433093c993baed19e529"

# Même namespace "avail-cache" que côté Pages (get-availability.js/beds24-webhook.js) —
# permet au Worker de purger le cache dispo à la détection d'une résa/annulation iCal.
[[kv_namespaces]]
binding = "AVAIL_CACHE"
id = "a6bcfe4247d24169b65471ad6bc35f66"

# Variables d'environnement publiques
[vars]
NOTIFICATION_EMAIL = "vinsmaf@hotmail.com,celine.hartog@hotmail.fr"
SITE_URL           = "https://villamaryllis.com"

# Secrets à ajouter via :
#   wrangler secret put APPS_SCRIPT_URL
#   wrangler secret put RESEND_API_KEY

# ─── Revenue Manager — D1 database ───────────────────────────────────────────
# Binding for Cloudflare Pages Functions (rm-* endpoints)
# Add this binding in Cloudflare Pages dashboard:
#   Dashboard → Pages → dashboard-amaryllis → Settings → Functions → D1 database bindings
#   Variable name: revenue_manager   Database: revenue-manager (dbfa8069-8013-4400-a854-8324a1290a6e)
[[d1_databases]]
binding = "revenue_manager"
database_name = "revenue-manager"
database_id = "dbfa8069-8013-4400-a854-8324a1290a6e"
